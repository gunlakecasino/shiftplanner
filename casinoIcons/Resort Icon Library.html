<style>
:root {
  /* Warm parchment chrome — Four Diamond hospitality reads warm, not cool */
  --bg:        #f4f1e9;
  --bg-2:      #ebe6da;
  --surface:   #ffffff;
  --surface-2: #faf7f0;
  --surface-3: #efebe1;

  --ink-900: #14181f;
  --ink-800: #1f2530;
  --ink-700: #303743;
  --ink-500: #5d6573;
  --ink-400: #7a8290;
  --ink-300: #98a0ad;
  --ink-200: #c2c8d0;
  --ink-100: #e3e2dc;

  /* Champagne gold — the spine of luxury hospitality identity */
  --gold:        #b8956a;
  --gold-deep:   #8a6f4f;
  --gold-light:  #d9bf95;
  --gold-bg:     rgba(184, 149, 106, 0.10);
  --gold-bg-2:   rgba(184, 149, 106, 0.18);

  /* Reserved accent — only used for "in play" / wins / status */
  --house:       #7a1a2b;     /* deep claret, the cardroom red */
  --house-bg:    rgba(122, 26, 43, 0.08);
  --jade:        #2f6e5e;     /* table felt green */
  --jade-bg:     rgba(47, 110, 94, 0.10);

  --line:        rgba(20, 24, 31, 0.07);
  --line-strong: rgba(20, 24, 31, 0.14);
  --divider:     rgba(20, 24, 31, 0.06);

  --tint-1: rgba(20, 24, 31, 0.03);
  --tint-2: rgba(20, 24, 31, 0.06);
  --tint-3: rgba(20, 24, 31, 0.10);
  --tint-4: rgba(20, 24, 31, 0.16);

  --font:    "Inter", -apple-system, "SF Pro Text", system-ui, sans-serif;
  --serif:   "Cormorant Garamond", "Source Serif 4", Georgia, serif;
  --display: "Barlow", "Inter", system-ui, sans-serif;
  --mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --ease:        cubic-bezier(.22,.61,.36,1);
  --ease-spring: cubic-bezier(.34,1.4,.5,1);

  --shadow-sm: 0 1px 2px rgba(20,24,31,.05), 0 0 0 0.5px rgba(20,24,31,.04);
  --shadow-md: 0 2px 6px rgba(20,24,31,.04), 0 10px 28px rgba(20,24,31,.07), 0 0 0 0.5px rgba(20,24,31,.05);
  --shadow-lg: 0 24px 48px rgba(20,24,31,.18), 0 6px 12px rgba(20,24,31,.08), 0 0 0 0.5px rgba(20,24,31,.05);
  --shadow-xl: 0 40px 80px rgba(20,24,31,.22), 0 12px 24px rgba(20,24,31,.10);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font);
  color: var(--ink-900);
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 1400px 900px at 50% -10%, rgba(184,149,106,0.10), transparent 60%),
    radial-gradient(ellipse 900px 700px at 0% 110%, rgba(20,24,31,0.03), transparent 60%);
  background-attachment: fixed;
  font-feature-settings: "ss01", "cv11", "cv02";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-size: 14px;
  line-height: 1.45;
}
button, input { font-family: inherit; }
button { cursor: pointer; border: none; background: transparent; padding: 0; color: inherit; }
input { border: none; outline: none; background: transparent; color: inherit; }
input::placeholder { color: var(--ink-300); }
a { color: inherit; text-decoration: none; }

.tnum { font-variant-numeric: tabular-nums; }

.scroll::-webkit-scrollbar { width: 10px; height: 10px; }
.scroll::-webkit-scrollbar-track { background: transparent; }
.scroll::-webkit-scrollbar-thumb {
  background: var(--ink-200);
  border-radius: 5px;
  border: 2px solid var(--bg);
}
.scroll::-webkit-scrollbar-thumb:hover { background: var(--ink-300); }

@keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes popIn    { from { opacity: 0; transform: scale(.97) translateY(-2px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes slideInRight { from { transform: translateX(100%); opacity: .6; } to { transform: translateX(0); opacity: 1; } }
@keyframes glow     { 0%,100% { opacity: .55; } 50% { opacity: 1; } }

.anim-fade  { animation: fadeIn  .2s var(--ease) both; }
.anim-up    { animation: slideUp .25s var(--ease) both; }
.anim-pop   { animation: popIn   .16s var(--ease-spring) both; }
.anim-panel { animation: slideInRight .32s var(--ease-spring) both; }

/* Dark theme — for previewing icons against dark surfaces */
body.theme-dark {
  --bg:        #0e1115;
  --bg-2:      #161a20;
  --surface:   #1a1f26;
  --surface-2: #20262e;
  --surface-3: #262d36;
  --ink-900: #f1ece0;
  --ink-800: #e1dbcb;
  --ink-700: #c5beac;
  --ink-500: #8c8674;
  --ink-400: #6e6856;
  --ink-300: #524d3f;
  --ink-200: #38342a;
  --ink-100: #26241e;
  --line:        rgba(241, 236, 224, 0.08);
  --line-strong: rgba(241, 236, 224, 0.18);
  --divider:     rgba(241, 236, 224, 0.06);
  --tint-1: rgba(241, 236, 224, 0.04);
  --tint-2: rgba(241, 236, 224, 0.08);
  --tint-3: rgba(241, 236, 224, 0.14);
  --tint-4: rgba(241, 236, 224, 0.20);
  background-image:
    radial-gradient(ellipse 1400px 900px at 50% -10%, rgba(184,149,106,0.08), transparent 60%);
}
</style>
