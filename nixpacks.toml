# nixpacks.toml
# Forces Railway to use Node 20 + pnpm for the ShiftBuilder web app.
# This overrides Nixpacks' tendency to detect the Deno Edge Function
# in supabase/functions/ and break the pnpm build.

[env]
# Force a recent Node 20.x version. The default nixpkgs snapshot Railway uses
# often only has very old patches (e.g. 20.6.1), which is too old for Next.js 16.
NIXPACKS_NODE_VERSION = "20.12.2"

[phases.setup]
nixPkgs = ['nodejs_20']

[phases.install]
cmds = [
  'corepack enable',
  'corepack prepare pnpm@9.15.9 --activate',
  'pnpm install --frozen-lockfile'
]

[phases.build]
cmds = ['pnpm build']

[start]
cmd = 'pnpm start'

[build]
# Exclude the Deno Edge Functions directory from the web build context.
# These are deployed separately via the Supabase CLI.
exclude = ["supabase/functions"]
